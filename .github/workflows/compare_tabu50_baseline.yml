name: Compare MultiLevel vs Tabu - Size 50

# Config for MultiLevel (change these to tune the comparison)
# ./multilevel <file> <MAX_LEVELS> <ITER_PER_SEGMENT> <SEGMENTS_PER_LEVEL>
# Total ML iterations = 2 * ITER_PER_SEGMENT * ML_LEVELS * ML_SEGMENTS
env:
  ML_LEVELS: 5
  ML_SEGMENTS: 10
  # ITER_PER_SEGMENT is passed as the instance size (50) → total = 2*50*10*5 = 5000

on:
  push:
    branches: [ main, master, method_A ]
  pull_request:
    branches: [ main, master, method_A ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile:
    name: Compile Both
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: sudo apt-get update && sudo apt-get install -y g++ bc
    - name: Compile Tabu
      run: g++ -O3 -std=c++17 -o tabu src/Tabu_no_lwt.cpp && chmod +x tabu
    - name: Compile MultiLevel
      run: g++ -O3 -std=c++17 -o multilevel src/Multilevel_Tabu_no_lwt.cpp && chmod +x multilevel
    - uses: actions/upload-artifact@v4
      with:
        name: executables
        path: |
          tabu
          multilevel
        retention-days: 1

  run-tabu:
    name: Tabu ${{ matrix.instance }}
    needs: compile
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        instance: [
          "50.10.1", "50.10.2", "50.10.3", "50.10.4",
          "50.20.1", "50.20.2", "50.20.3", "50.20.4",
          "50.30.1", "50.30.2", "50.30.3", "50.30.4",
          "50.40.1", "50.40.2", "50.40.3", "50.40.4"
        ]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        name: executables
    - name: Run Tabu 5 times
      run: |
        chmod +x tabu
        for run in {1..5}; do
          START=$(date +%s.%N)
          timeout 30m ./tabu instances/${{ matrix.instance }}.txt > out${run}.txt 2>&1
          EXIT=$?
          echo "$(echo "$(date +%s.%N) - $START" | bc)" > rt${run}.txt
          [ $EXIT -eq 124 ] && echo "TIMEOUT"            >> out${run}.txt
          [ $EXIT -ne 0 ] && [ $EXIT -ne 124 ] && echo "ERROR_EXIT_CODE_$EXIT" >> out${run}.txt
        done
    - name: Parse results
      run: |
        python3 <<'EOF'
        import re, json, os
        instance = "${{ matrix.instance }}"
        parts    = instance.split(".")

        def last(pattern, text):
            m = re.findall(pattern, text)
            return float(m[-1]) if m else 0.0

        def parse(out, rt):
            if not os.path.exists(out):
                return {"status": "NO_OUTPUT", "runtime": 0.0,
                        "makespan": 0.0, "drone_violation": 0.0,
                        "waiting_violation": 0.0, "fitness": float("inf"), "feasible": "NO_OUTPUT"}
            text = open(out, encoding="utf-8", errors="ignore").read()
            t = 0.0
            if os.path.exists(rt):
                try: t = float(open(rt).read().strip())
                except: pass
            if "TIMEOUT" in text:
                return {"runtime": round(t,3), "makespan": 0.0, "drone_violation": 0.0,
                        "waiting_violation": 0.0, "fitness": float("inf"), "feasible": "TIMEOUT"}
            if "ERROR_EXIT_CODE" in text or "Fitness:" not in text:
                return {"runtime": round(t,3), "makespan": 0.0, "drone_violation": 0.0,
                        "waiting_violation": 0.0, "fitness": float("inf"), "feasible": "ERROR"}
            dv = last(r'Drone violation:\s*([0-9.+\-eE]+)', text)
            wv = last(r'Waiting violation:\s*([0-9.+\-eE]+)', text)
            return {
                "runtime":           round(t, 3),
                "makespan":          round(last(r'Makespan:\s*([0-9.+\-eE]+)', text), 4),
                "drone_violation":   round(dv, 4),
                "waiting_violation": round(wv, 4),
                "fitness":           round(last(r'Fitness:\s*([0-9.+\-eE]+)', text), 4),
                "feasible":          "YES" if abs(dv) < 1e-6 and abs(wv) < 1e-6 else "NO",
            }

        runs = [{"run": i, **parse(f"out{i}.txt", f"rt{i}.txt")} for i in range(1, 6)]
        json.dump({
            "instance": instance,
            "num_customers": int(parts[0]),
            "group": int(parts[1]),
            "replica": int(parts[2]),
            "algorithm": "TABU",
            "runs": runs,
        }, open("results.json", "w"), indent=2)
        EOF
    - uses: actions/upload-artifact@v4
      with:
        name: tabu50-${{ matrix.instance }}
        path: results.json
        retention-days: 30

  run-multilevel:
    name: ML ${{ matrix.instance }}
    needs: compile
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        instance: [
          "50.10.1", "50.10.2", "50.10.3", "50.10.4",
          "50.20.1", "50.20.2", "50.20.3", "50.20.4",
          "50.30.1", "50.30.2", "50.30.3", "50.30.4",
          "50.40.1", "50.40.2", "50.40.3", "50.40.4"
        ]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        name: executables
    - name: Run MultiLevel 5 times
      # args: <file> <MAX_LEVELS> <ITER_PER_SEGMENT> <SEGMENTS_PER_LEVEL>
      run: |
        chmod +x multilevel
        for run in {1..5}; do
          START=$(date +%s.%N)
          timeout 30m ./multilevel instances/${{ matrix.instance }}.txt 5 50 10 > out${run}.txt 2>&1
          EXIT=$?
          echo "$(echo "$(date +%s.%N) - $START" | bc)" > rt${run}.txt
          [ $EXIT -eq 124 ] && echo "TIMEOUT"            >> out${run}.txt
          [ $EXIT -ne 0 ] && [ $EXIT -ne 124 ] && echo "ERROR_EXIT_CODE_$EXIT" >> out${run}.txt
        done
    - name: Parse results
      run: |
        python3 <<'EOF'
        import re, json, os
        instance = "${{ matrix.instance }}"
        parts    = instance.split(".")

        def last(pattern, text):
            m = re.findall(pattern, text)
            return float(m[-1]) if m else 0.0

        def parse(out, rt):
            if not os.path.exists(out):
                return {"runtime": 0.0, "makespan": 0.0, "drone_violation": 0.0,
                        "waiting_violation": 0.0, "fitness": float("inf"), "feasible": "NO_OUTPUT"}
            text = open(out, encoding="utf-8", errors="ignore").read()
            t = 0.0
            if os.path.exists(rt):
                try: t = float(open(rt).read().strip())
                except: pass
            if "TIMEOUT" in text:
                return {"runtime": round(t,3), "makespan": 0.0, "drone_violation": 0.0,
                        "waiting_violation": 0.0, "fitness": float("inf"), "feasible": "TIMEOUT"}
            if "ERROR_EXIT_CODE" in text or "Fitness:" not in text:
                return {"runtime": round(t,3), "makespan": 0.0, "drone_violation": 0.0,
                        "waiting_violation": 0.0, "fitness": float("inf"), "feasible": "ERROR"}
            dv = last(r'Drone violation:\s*([0-9.+\-eE]+)', text)
            wv = last(r'Waiting violation:\s*([0-9.+\-eE]+)', text)
            return {
                "runtime":           round(t, 3),
                "makespan":          round(last(r'Makespan:\s*([0-9.+\-eE]+)', text), 4),
                "drone_violation":   round(dv, 4),
                "waiting_violation": round(wv, 4),
                "fitness":           round(last(r'Fitness:\s*([0-9.+\-eE]+)', text), 4),
                "feasible":          "YES" if abs(dv) < 1e-6 and abs(wv) < 1e-6 else "NO",
            }

        runs = [{"run": i, **parse(f"out{i}.txt", f"rt{i}.txt")} for i in range(1, 6)]
        json.dump({
            "instance": instance,
            "num_customers": int(parts[0]),
            "group": int(parts[1]),
            "replica": int(parts[2]),
            "algorithm": "MULTILEVEL",
            "ml_config": "L5_S10_iter50",   # MAX_LEVELS=5, SEGMENTS=10, ITER_PER_SEG=50
            "runs": runs,
        }, open("results.json", "w"), indent=2)
        EOF
    - uses: actions/upload-artifact@v4
      with:
        name: ml50-${{ matrix.instance }}
        path: results.json
        retention-days: 30

  aggregate:
    name: Compare ML vs Tabu
    needs: [run-tabu, run-multilevel]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Download Tabu results
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        pattern: tabu50-*
        merge-multiple: false
    - name: Download MultiLevel results
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        pattern: ml50-*
        merge-multiple: false

    - name: Build comparison CSV
      run: |
        python3 <<'EOF'
        import json, glob, csv, os

        INF = float("inf")

        # ── load results ─────────────────────────────────────────────────────────
        def load(pattern):
            out = {}
            for d in glob.glob(pattern):
                f = os.path.join(d, "results.json")
                if os.path.exists(f):
                    r = json.load(open(f))
                    out[r["instance"]] = r
            return out

        tabu = load("tabu50-*")
        ml   = load("ml50-*")
        all_instances = sorted(
            set(list(tabu) + list(ml)),
            key=lambda x: tuple(int(p) for p in x.split("."))
        )

        # ── summarise 5 runs into best / avg ─────────────────────────────────────
        def summarize(data):
            if data is None:
                return None
            runs = data["runs"]
            valid_fitness = [r["fitness"] for r in runs if r["fitness"] != INF]
            feasible_cnt  = sum(1 for r in runs if r["feasible"] == "YES")
            return {
                "best_fitness":   min(valid_fitness) if valid_fitness else INF,
                "avg_fitness":    round(sum(valid_fitness)/len(valid_fitness), 4) if valid_fitness else INF,
                "avg_time_s":     round(sum(r["runtime"] for r in runs)/len(runs), 3),
                "feasible_count": feasible_cnt,
                "feasible_rate":  round(feasible_cnt / len(runs) * 100, 1),
            }

        # ── gap formula ───────────────────────────────────────────────────────────
        # Gap = (ML_value - Tabu_value) / Tabu_value * 100 %
        #   NEGATIVE → ML is better (smaller fitness / faster time)
        #   POSITIVE → Tabu is better
        def gap(ml_val, tabu_val):
            if tabu_val in (0, INF) or ml_val == INF:
                return "N/A"
            return round((ml_val - tabu_val) / tabu_val * 100, 4)

        def winner(g):
            if g == "N/A":    return "N/A"
            if abs(g) < 1e-4: return "TIE"
            return "ML_BETTER" if g < 0 else "TABU_BETTER"

        # ── write comparison CSV ──────────────────────────────────────────────────
        cols = [
            "Instance", "Num_Customers", "Group", "Replica",

            # Tabu columns
            "Tabu_Best_Fitness",
            "Tabu_Avg_Fitness",
            "Tabu_Avg_Time_s",
            "Tabu_Feasible_Rate_%",

            # MultiLevel columns  (config: MAX_LEVELS=5, SEGMENTS=10, ITER_PER_SEG=50)
            "ML_Best_Fitness",
            "ML_Avg_Fitness",
            "ML_Avg_Time_s",
            "ML_Feasible_Rate_%",

            # Gap: (ML - Tabu) / Tabu * 100 %
            # Negative = ML better, Positive = Tabu better
            "Gap_BestFitness_%",
            "Gap_AvgFitness_%",
            "Gap_AvgTime_%",

            # Winner based on best fitness
            "Winner",            # ML_BETTER | TABU_BETTER | TIE | N/A
        ]

        rows = []
        for inst in all_instances:
            parts = inst.split(".")
            t = summarize(tabu.get(inst))
            m = summarize(ml.get(inst))

            g_best = gap(m["best_fitness"] if m else INF,
                         t["best_fitness"] if t else INF)
            g_avg  = gap(m["avg_fitness"]  if m else INF,
                         t["avg_fitness"]  if t else INF)
            g_time = gap(m["avg_time_s"]   if m else INF,
                         t["avg_time_s"]   if t else INF)

            rows.append({
                "Instance":          inst,
                "Num_Customers":     parts[0],
                "Group":             parts[1],
                "Replica":           parts[2],

                "Tabu_Best_Fitness":  t["best_fitness"]  if t else "N/A",
                "Tabu_Avg_Fitness":   t["avg_fitness"]   if t else "N/A",
                "Tabu_Avg_Time_s":    t["avg_time_s"]    if t else "N/A",
                "Tabu_Feasible_Rate_%": t["feasible_rate"] if t else "N/A",

                "ML_Best_Fitness":    m["best_fitness"]  if m else "N/A",
                "ML_Avg_Fitness":     m["avg_fitness"]   if m else "N/A",
                "ML_Avg_Time_s":      m["avg_time_s"]    if m else "N/A",
                "ML_Feasible_Rate_%": m["feasible_rate"] if m else "N/A",

                "Gap_BestFitness_%":  g_best,
                "Gap_AvgFitness_%":   g_avg,
                "Gap_AvgTime_%":      g_time,

                "Winner": winner(g_best),
            })

        with open("COMPARE_ML_vs_TABU_50.csv", "w", newline="") as f:
            w = csv.DictWriter(f, fieldnames=cols)
            w.writeheader()
            w.writerows(rows)

        # ── print summary ─────────────────────────────────────────────────────────
        ml_wins   = sum(1 for r in rows if r["Winner"] == "ML_BETTER")
        tabu_wins = sum(1 for r in rows if r["Winner"] == "TABU_BETTER")
        ties      = sum(1 for r in rows if r["Winner"] == "TIE")
        no_data   = sum(1 for r in rows if r["Winner"] == "N/A")

        print("=" * 55)
        print("  ML vs Tabu — Size 50 Summary")
        print("  ML config: MAX_LEVELS=5, SEGMENTS=10, ITER/SEG=50")
        print("=" * 55)
        print(f"  Instances compared : {len(rows)}")
        print(f"  ML_BETTER  (gap < 0): {ml_wins}")
        print(f"  TABU_BETTER(gap > 0): {tabu_wins}")
        print(f"  TIE                 : {ties}")
        print(f"  N/A (missing data)  : {no_data}")
        print("=" * 55)
        print("  Gap = (ML_Fitness - Tabu_Fitness) / Tabu_Fitness × 100 %")
        print("  Negative gap → ML has LOWER fitness  → ML BETTER")
        print("  Positive gap → Tabu has LOWER fitness → Tabu BETTER")
        print("=" * 55)
        EOF

    - uses: actions/upload-artifact@v4
      with:
        name: compare-ml-vs-tabu-50
        path: COMPARE_ML_vs_TABU_50.csv
        retention-days: 90