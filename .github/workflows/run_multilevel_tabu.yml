  run-50-ab:
    name: 50ab ${{ matrix.instance }}_S${{ matrix.segments_per_level }}_L${{ matrix.num_levels }}
    needs: compile
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        segments_per_level: [5, 10, 15]
        num_levels: [3, 4, 5, 6, 7, 8]
        instance: [
          "50.10.1", "50.10.2", "50.20.1", "50.20.2",
          "50.30.1", "50.30.2", "50.40.1", "50.40.2"
        ]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Download executable
      uses: actions/download-artifact@v4
      with:
        name: multilevel-tabu-executable
    - name: Run algorithm 5 times
      run: |
        chmod +x multilevel_tabu
        for run in {1..5}; do
          START_TIME=$(date +%s.%N)
          timeout 25m ./multilevel_tabu instances/${{ matrix.instance }}.txt ${{ matrix.num_levels }} 300 ${{ matrix.segments_per_level }} > output_run${run}.txt 2>&1 || echo "TIMEOUT" >> output_run${run}.txt
          END_TIME=$(date +%s.%N)
          echo "$(echo "$END_TIME - $START_TIME" | bc)" > runtime_run${run}.txt
        done
    - name: Parse results
      run: |
        python3 <<'EOF'
        import re, json, os
        instance = "${{ matrix.instance }}"
        segments = ${{ matrix.segments_per_level }}
        levels = ${{ matrix.num_levels }}
        def find_metric_last(pattern, content):
            matches = re.findall(pattern, content)
            if not matches: return 0.0
            try: return float(matches[-1])
            except: return 0.0
        def parse_output(output_file, runtime_file):
            try:
                with open(output_file, "r", encoding="utf-8", errors="ignore") as f:
                    content = f.read()
                if "TIMEOUT" in content or not content or "Fitness:" not in content:
                    runtime = 1500.0
                    if os.path.exists(runtime_file):
                        with open(runtime_file, "r") as f: runtime = float(f.read().strip())
                    return {"runtime": round(runtime, 3), "makespan": 0.0, "drone_violation": 0.0,
                            "waiting_violation": 0.0, "fitness": float('inf'), "feasible": "TIMEOUT",
                            "segments_per_level": segments, "num_levels": levels}
                runtime = 0.0
                if os.path.exists(runtime_file):
                    with open(runtime_file, "r") as f: runtime = float(f.read().strip())
                makespan = find_metric_last(r'Makespan:\s*([0-9.+\-eE]+)', content)
                drone_viol = find_metric_last(r'Drone violation:\s*([0-9.+\-eE]+)', content)
                waiting_viol = find_metric_last(r'Waiting violation:\s*([0-9.+\-eE]+)', content)
                fitness = find_metric_last(r'Fitness:\s*([0-9.+\-eE]+)', content)
                feasible = "YES" if (abs(drone_viol) < 1e-6 and abs(waiting_viol) < 1e-6) else "NO"
                return {"runtime": round(runtime, 3), "makespan": round(makespan, 4),
                        "drone_violation": round(drone_viol, 4), "waiting_violation": round(waiting_viol, 4),
                        "fitness": round(fitness, 4), "feasible": feasible,
                        "segments_per_level": segments, "num_levels": levels}
            except Exception as e:
                return {"runtime": 0, "makespan": 0, "drone_violation": 0,
                        "waiting_violation": 0, "fitness": float('inf'), "feasible": "ERROR",
                        "segments_per_level": segments, "num_levels": levels}
        runs = []
        for run in range(1, 6):
            result = parse_output(f"output_run{run}.txt", f"runtime_run{run}.txt")
            result["run"] = run
            runs.append(result)
        with open("results.json", "w") as f:
            json.dump({"instance": instance, "segments_per_level": segments, "num_levels": levels, "runs": runs}, f, indent=2)
        EOF
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: multilevel-result-${{ matrix.instance }}-S${{ matrix.segments_per_level }}-L${{ matrix.num_levels }}
        path: results.json
        retention-days: 30

