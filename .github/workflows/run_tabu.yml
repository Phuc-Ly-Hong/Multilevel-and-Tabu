name: Run Tabu Search with Segment Matrix

on:
  push:
    branches: [ main, master, method_A ]
  pull_request:
    branches: [ main, master, method_A ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile:
    name: Compile Tabu
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ bc
    
    - name: Compile executable
      run: |
        g++ -O3 -std=c++17 -o tabu src/Tabu_no_lwt.cpp
        chmod +x tabu
    
    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: tabu-executable
        path: tabu
        retention-days: 7

  run-small:
    name: Small ${{ matrix.instance }}_S${{ matrix.segments }}
    needs: compile
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        segments: [5, 10, 15]
        instance: [
          "6.5.1", "6.10.1", "6.20.1",
          "10.5.1", "10.10.1", "10.20.1",
          "12.5.1", "12.10.1", "12.20.1",
          "20.5.1", "20.10.1", "20.20.1"
        ]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download executable
      uses: actions/download-artifact@v4
      with:
        name: tabu-executable
    
    - name: Run algorithm 5 times
      run: |
        chmod +x tabu
        
        for run in {1..5}; do
          START_TIME=$(date +%s.%N)
          timeout 3m ./tabu instances/${{ matrix.instance }}.txt 300 ${{ matrix.segments }} > output_run${run}.txt 2>&1
          EXIT_CODE=$?
          END_TIME=$(date +%s.%N)
          echo "$(echo "$END_TIME - $START_TIME" | bc)" > runtime_run${run}.txt
          
          if [ $EXIT_CODE -eq 124 ]; then
            echo "TIMEOUT" >> output_run${run}.txt
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "ERROR_EXIT_CODE_$EXIT_CODE" >> output_run${run}.txt
          fi
        done
    
    - name: Parse results
      run: |
        python3 <<'EOF'
        import re, json, os
        instance = "${{ matrix.instance }}"
        segments = ${{ matrix.segments }}
        
        def find_metric_last(pattern, content):
            matches = re.findall(pattern, content)
            if not matches:
                return 0.0
            try:
                return float(matches[-1])
            except:
                return 0.0
        
        def parse_output(output_file, runtime_file):
            try:
                if not os.path.exists(output_file):
                    return {"runtime": 0, "makespan": 0, "drone_violation": 0,
                            "waiting_violation": 0, "fitness": float('inf'), "feasible": "NO_OUTPUT",
                            "segments": segments, "num_levels": "N/A"}
                
                with open(output_file, "r", encoding="utf-8", errors="ignore") as f:
                    content = f.read()
                
                runtime = 180.0
                if os.path.exists(runtime_file):
                    with open(runtime_file, "r") as f:
                        try:
                            runtime = float(f.read().strip())
                        except:
                            pass
                
                if "TIMEOUT" in content:
                    return {"runtime": round(runtime, 3), "makespan": 0.0,
                            "drone_violation": 0.0, "waiting_violation": 0.0,
                            "fitness": float('inf'), "feasible": "TIMEOUT",
                            "segments": segments, "num_levels": "N/A"}
                
                if "ERROR_EXIT_CODE" in content or not content or "Fitness:" not in content:
                    return {"runtime": round(runtime, 3), "makespan": 0.0,
                            "drone_violation": 0.0, "waiting_violation": 0.0,
                            "fitness": float('inf'), "feasible": "ERROR",
                            "segments": segments, "num_levels": "N/A"}
                
                makespan = find_metric_last(r'Makespan:\s*([0-9.+\-eE]+)', content)
                drone_viol = find_metric_last(r'Drone violation:\s*([0-9.+\-eE]+)', content)
                waiting_viol = find_metric_last(r'Waiting violation:\s*([0-9.+\-eE]+)', content)
                fitness = find_metric_last(r'Fitness:\s*([0-9.+\-eE]+)', content)
                
                feasible = "YES" if (abs(drone_viol) < 1e-6 and abs(waiting_viol) < 1e-6) else "NO"
                
                return {
                    "runtime": round(runtime, 3), "makespan": round(makespan, 4),
                    "drone_violation": round(drone_viol, 4), "waiting_violation": round(waiting_viol, 4),
                    "fitness": round(fitness, 4), "feasible": feasible,
                    "segments": segments, "num_levels": "N/A"
                }
            except Exception as e:
                return {"runtime": 0, "makespan": 0, "drone_violation": 0,
                        "waiting_violation": 0, "fitness": float('inf'), "feasible": "PARSE_ERROR",
                        "segments": segments, "num_levels": "N/A"}
        
        runs = []
        for run in range(1, 6):
            result = parse_output(f"output_run{run}.txt", f"runtime_run{run}.txt")
            result["run"] = run
            runs.append(result)
        
        with open("results.json", "w") as f:
            json.dump({"instance": instance, "segments": segments, "runs": runs}, f, indent=2)
        EOF
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: tabu-result-${{ matrix.instance }}-S${{ matrix.segments }}
        path: results.json
        retention-days: 30

  run-medium:
    name: Medium ${{ matrix.instance }}_S${{ matrix.segments }}
    needs: compile
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    strategy:
      fail-fast: false
      max-parallel: 15
      matrix:
        segments: [5, 10, 15]
        instance: [
          "50.10.1", "50.20.1", "50.30.1", "50.40.1"
        ]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download executable
      uses: actions/download-artifact@v4
      with:
        name: tabu-executable
    
    - name: Run algorithm 5 times
      run: |
        chmod +x tabu
        
        for run in {1..5}; do
          START_TIME=$(date +%s.%N)
          timeout 8m ./tabu instances/${{ matrix.instance }}.txt 300 ${{ matrix.segments }} > output_run${run}.txt 2>&1
          EXIT_CODE=$?
          END_TIME=$(date +%s.%N)
          echo "$(echo "$END_TIME - $START_TIME" | bc)" > runtime_run${run}.txt
          
          if [ $EXIT_CODE -eq 124 ]; then
            echo "TIMEOUT" >> output_run${run}.txt
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "ERROR_EXIT_CODE_$EXIT_CODE" >> output_run${run}.txt
          fi
        done
    
    - name: Parse results
      run: |
        python3 <<'EOF'
        import re, json, os
        instance = "${{ matrix.instance }}"
        segments = ${{ matrix.segments }}
        
        def find_metric_last(pattern, content):
            matches = re.findall(pattern, content)
            return float(matches[-1]) if matches else 0.0
        
        def parse_output(output_file, runtime_file):
            try:
                with open(output_file, "r", encoding="utf-8", errors="ignore") as f:
                    content = f.read()
                
                runtime = 480.0
                if os.path.exists(runtime_file):
                    with open(runtime_file, "r") as f:
                        runtime = float(f.read().strip())
                
                if "TIMEOUT" in content or "ERROR_EXIT_CODE" in content or not content or "Fitness:" not in content:
                    return {"runtime": round(runtime, 3), "makespan": 0.0,
                            "drone_violation": 0.0, "waiting_violation": 0.0,
                            "fitness": float('inf'), "feasible": "TIMEOUT",
                            "segments": segments, "num_levels": "N/A"}
                
                makespan = find_metric_last(r'Makespan:\s*([0-9.+\-eE]+)', content)
                drone_viol = find_metric_last(r'Drone violation:\s*([0-9.+\-eE]+)', content)
                waiting_viol = find_metric_last(r'Waiting violation:\s*([0-9.+\-eE]+)', content)
                fitness = find_metric_last(r'Fitness:\s*([0-9.+\-eE]+)', content)
                feasible = "YES" if (abs(drone_viol) < 1e-6 and abs(waiting_viol) < 1e-6) else "NO"
                
                return {"runtime": round(runtime, 3), "makespan": round(makespan, 4),
                        "drone_violation": round(drone_viol, 4), "waiting_violation": round(waiting_viol, 4),
                        "fitness": round(fitness, 4), "feasible": feasible,
                        "segments": segments, "num_levels": "N/A"}
            except:
                return {"runtime": 0, "makespan": 0, "drone_violation": 0, "waiting_violation": 0,
                        "fitness": float('inf'), "feasible": "ERROR",
                        "segments": segments, "num_levels": "N/A"}
        
        runs = [parse_output(f"output_run{i}.txt", f"runtime_run{i}.txt") | {"run": i} for i in range(1, 6)]
        with open("results.json", "w") as f:
            json.dump({"instance": instance, "segments": segments, "runs": runs}, f, indent=2)
        EOF
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: tabu-result-${{ matrix.instance }}-S${{ matrix.segments }}
        path: results.json
        retention-days: 30

  run-large:
    name: Large ${{ matrix.instance }}_S${{ matrix.segments }}
    needs: compile
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        segments: [5, 10, 15]
        instance: [
          "100.10.1", "100.20.1"
        ]
    
    steps:
    - name: Checkpoint code
      uses: actions/checkout@v4
    
    - name: Download executable
      uses: actions/download-artifact@v4
      with:
        name: tabu-executable
    
    - name: Run algorithm 5 times
      run: |
        chmod +x tabu
        
        for run in {1..5}; do
          START_TIME=$(date +%s.%N)
          timeout 15m ./tabu instances/${{ matrix.instance }}.txt 300 ${{ matrix.segments }} > output_run${run}.txt 2>&1
          EXIT_CODE=$?
          END_TIME=$(date +%s.%N)
          echo "$(echo "$END_TIME - $START_TIME" | bc)" > runtime_run${run}.txt
          
          if [ $EXIT_CODE -eq 124 ]; then
            echo "TIMEOUT" >> output_run${run}.txt
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "ERROR_EXIT_CODE_$EXIT_CODE" >> output_run${run}.txt
          fi
        done
    
    - name: Parse results
      run: |
        python3 <<'EOF'
        import re, json, os
        instance = "${{ matrix.instance }}"
        segments = ${{ matrix.segments }}
        
        def find_metric_last(pattern, content):
            matches = re.findall(pattern, content)
            return float(matches[-1]) if matches else 0.0
        
        def parse_output(output_file, runtime_file):
            try:
                with open(output_file, "r", encoding="utf-8", errors="ignore") as f:
                    content = f.read()
                
                runtime = 900.0
                if os.path.exists(runtime_file):
                    with open(runtime_file, "r") as f:
                        runtime = float(f.read().strip())
                
                if "TIMEOUT" in content or "ERROR_EXIT_CODE" in content or not content or "Fitness:" not in content:
                    return {"runtime": round(runtime, 3), "makespan": 0.0,
                            "drone_violation": 0.0, "waiting_violation": 0.0,
                            "fitness": float('inf'), "feasible": "TIMEOUT",
                            "segments": segments, "num_levels": "N/A"}
                
                makespan = find_metric_last(r'Makespan:\s*([0-9.+\-eE]+)', content)
                drone_viol = find_metric_last(r'Drone violation:\s*([0-9.+\-eE]+)', content)
                waiting_viol = find_metric_last(r'Waiting violation:\s*([0-9.+\-eE]+)', content)
                fitness = find_metric_last(r'Fitness:\s*([0-9.+\-eE]+)', content)
                feasible = "YES" if (abs(drone_viol) < 1e-6 and abs(waiting_viol) < 1e-6) else "NO"
                
                return {"runtime": round(runtime, 3), "makespan": round(makespan, 4),
                        "drone_violation": round(drone_viol, 4), "waiting_violation": round(waiting_viol, 4),
                        "fitness": round(fitness, 4), "feasible": feasible,
                        "segments": segments, "num_levels": "N/A"}
            except:
                return {"runtime": 0, "makespan": 0, "drone_violation": 0, "waiting_violation": 0,
                        "fitness": float('inf'), "feasible": "ERROR",
                        "segments": segments, "num_levels": "N/A"}
        
        runs = [parse_output(f"output_run{i}.txt", f"runtime_run{i}.txt") | {"run": i} for i in range(1, 6)]
        with open("results.json", "w") as f:
            json.dump({"instance": instance, "segments": segments, "runs": runs}, f, indent=2)
        EOF
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: tabu-result-${{ matrix.instance }}-S${{ matrix.segments }}
        path: results.json
        retention-days: 30

  aggregate:
    name: Create Summary
    needs: [run-small, run-medium, run-large]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
    - name: Download all results
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        pattern: tabu-result-*
        merge-multiple: false
    
    - name: Create summary CSV
      run: |
        python3 <<'EOF'
        import json, glob, csv, os
        
        all_data = []
        for result_dir in glob.glob("tabu-result-*"):
            json_file = os.path.join(result_dir, "results.json")
            if os.path.exists(json_file):
                with open(json_file) as f:
                    all_data.append(json.load(f))
        
        if not all_data:
            print("⚠️  No results found.")
        
        all_data.sort(key=lambda x: (tuple(map(int, x["instance"].split("."))), x["segments"]))
        
        with open("TABU_RESULTS.csv", "w", newline="") as f:
            cols = ["Instance", "Size", "Replica", "Segments", "Num_Levels", "Run", 
                    "Runtime_s", "Makespan", "Drone_Violation", "Waiting_Violation", "Fitness", "Feasible"]
            
            writer = csv.DictWriter(f, fieldnames=cols)
            writer.writeheader()
            
            for data in all_data:
                parts = data["instance"].split(".")
                instance, size, replica = data["instance"], int(parts[0]), int(parts[2])
                segments = data["segments"]
                
                for run_data in data["runs"]:
                    writer.writerow({
                        "Instance": instance, "Size": size, "Replica": replica,
                        "Segments": segments, "Num_Levels": "N/A",
                        "Run": run_data["run"], "Runtime_s": run_data["runtime"],
                        "Makespan": run_data["makespan"],
                        "Drone_Violation": run_data["drone_violation"],
                        "Waiting_Violation": run_data["waiting_violation"],
                        "Fitness": run_data["fitness"], "Feasible": run_data["feasible"]
                    })
        
        if all_data:
            print(f"✅ CSV created: {len(all_data)} config-instance combinations")
        else:
            print("✅ Empty CSV created")
        EOF
    
    - name: Upload CSV
      uses: actions/upload-artifact@v4
      with:
        name: tabu-results
        path: TABU_RESULTS.csv
        retention-days: 90