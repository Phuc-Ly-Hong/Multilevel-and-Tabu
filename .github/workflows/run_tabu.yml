name: Run Tabu Search with Multilevel-like Config Matrix

on:
  push:
    branches: [ main, master, method_A ]
  pull_request:
    branches: [ main, master, method_A ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  compile:
    name: Compile Tabu
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ bc

    - name: Compile executable
      run: |
        g++ -O3 -std=c++17 -o tabu src/Tabu_no_lwt.cpp
        chmod +x tabu

    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: tabu-executable
        path: tabu
        retention-days: 7

  run-50-ab:
    name: 50ab ${{ matrix.instance }}_S${{ matrix.segments_per_level }}_L${{ matrix.num_levels }}
    needs: compile
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        segments_per_level: [5, 10, 15]
        num_levels: [3, 4, 5, 6, 7, 8]
        instance: [
          "50.10.1", "50.10.2", "50.20.1", "50.20.2",
          "50.30.1", "50.30.2", "50.40.1", "50.40.2"
        ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download executable
      uses: actions/download-artifact@v4
      with:
        name: tabu-executable

    - name: Run algorithm 5 times
      run: |
        chmod +x tabu
        ITER_PER_SEG=50
        TOTAL_SEGMENTS=$((2 * ${{ matrix.segments_per_level }} * ${{ matrix.num_levels }}))

        for run in {1..5}; do
          START_TIME=$(date +%s.%N)
          timeout 25m ./tabu instances/${{ matrix.instance }}.txt ${ITER_PER_SEG} ${TOTAL_SEGMENTS} > output_run${run}.txt 2>&1
          EXIT_CODE=$?
          END_TIME=$(date +%s.%N)
          echo "$(echo "$END_TIME - $START_TIME" | bc)" > runtime_run${run}.txt

          if [ $EXIT_CODE -eq 124 ]; then
            echo "TIMEOUT" >> output_run${run}.txt
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "ERROR_EXIT_CODE_$EXIT_CODE" >> output_run${run}.txt
          fi
        done

    - name: Parse results
      run: |
        python3 <<'EOF'
        import re, json, os

        instance = "${{ matrix.instance }}"
        segments = ${{ matrix.segments_per_level }}
        levels = ${{ matrix.num_levels }}
        iter_per_seg = int(instance.split(".")[0])
        total_iter = 2 * iter_per_seg * segments * levels

        def find_metric_last(pattern, content):
            matches = re.findall(pattern, content)
            if not matches:
                return 0.0
            try:
                return float(matches[-1])
            except:
                return 0.0

        def parse_output(output_file, runtime_file):
            try:
                if not os.path.exists(output_file):
                    return {
                        "runtime": 0.0, "makespan": 0.0, "drone_violation": 0.0, "waiting_violation": 0.0,
                        "fitness": float("inf"), "feasible": "NO_OUTPUT",
                        "segments_per_level": segments, "num_levels": levels,
                        "iter_per_segment": iter_per_seg, "total_iter": total_iter
                    }

                with open(output_file, "r", encoding="utf-8", errors="ignore") as f:
                    content = f.read()

                runtime = 1500.0
                if os.path.exists(runtime_file):
                    with open(runtime_file, "r") as f:
                        try:
                            runtime = float(f.read().strip())
                        except:
                            pass

                if "TIMEOUT" in content:
                    return {
                        "runtime": round(runtime, 3), "makespan": 0.0, "drone_violation": 0.0, "waiting_violation": 0.0,
                        "fitness": float("inf"), "feasible": "TIMEOUT",
                        "segments_per_level": segments, "num_levels": levels,
                        "iter_per_segment": iter_per_seg, "total_iter": total_iter
                    }

                if "ERROR_EXIT_CODE" in content or not content or "Fitness:" not in content:
                    return {
                        "runtime": round(runtime, 3), "makespan": 0.0, "drone_violation": 0.0, "waiting_violation": 0.0,
                        "fitness": float("inf"), "feasible": "ERROR",
                        "segments_per_level": segments, "num_levels": levels,
                        "iter_per_segment": iter_per_seg, "total_iter": total_iter
                    }

                makespan = find_metric_last(r'Makespan:\s*([0-9.+\-eE]+)', content)
                drone_viol = find_metric_last(r'Drone violation:\s*([0-9.+\-eE]+)', content)
                waiting_viol = find_metric_last(r'Waiting violation:\s*([0-9.+\-eE]+)', content)
                fitness = find_metric_last(r'Fitness:\s*([0-9.+\-eE]+)', content)
                feasible = "YES" if (abs(drone_viol) < 1e-6 and abs(waiting_viol) < 1e-6) else "NO"

                return {
                    "runtime": round(runtime, 3),
                    "makespan": round(makespan, 4),
                    "drone_violation": round(drone_viol, 4),
                    "waiting_violation": round(waiting_viol, 4),
                    "fitness": round(fitness, 4),
                    "feasible": feasible,
                    "segments_per_level": segments, "num_levels": levels,
                    "iter_per_segment": iter_per_seg, "total_iter": total_iter
                }
            except:
                return {
                    "runtime": 0.0, "makespan": 0.0, "drone_violation": 0.0, "waiting_violation": 0.0,
                    "fitness": float("inf"), "feasible": "PARSE_ERROR",
                    "segments_per_level": segments, "num_levels": levels,
                    "iter_per_segment": iter_per_seg, "total_iter": total_iter
                }

        runs = []
        for run in range(1, 6):
            result = parse_output(f"output_run{run}.txt", f"runtime_run{run}.txt")
            result["run"] = run
            runs.append(result)

        with open("results.json", "w") as f:
            json.dump({
                "instance": instance,
                "segments_per_level": segments,
                "num_levels": levels,
                "iter_per_segment": iter_per_seg,
                "total_iter": total_iter,
                "runs": runs
            }, f, indent=2)
        EOF

    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: tabu-result-${{ matrix.instance }}-S${{ matrix.segments_per_level }}-L${{ matrix.num_levels }}
        path: results.json
        retention-days: 30

