name: Compare MultiLevel vs Tabu - 50 and 100

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile:
    name: Compile Both
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - run: sudo apt-get update && sudo apt-get install -y g++ bc
    
    - name: Compile Tabu
      run: g++ -O3 -std=c++17 -o tabu src/Tabu_no_lwt.cpp && chmod +x tabu
    
    - name: Compile MultiLevel
      run: g++ -O3 -std=c++17 -o multilevel src/Multilevel_Tabu_no_lwt.cpp && chmod +x multilevel
    
    - name: Upload Tabu
      uses: actions/upload-artifact@v4
      with:
        name: tabu-exe
        path: tabu
        retention-days: 1
    
    - name: Upload MultiLevel
      uses: actions/upload-artifact@v4
      with:
        name: multilevel-exe
        path: multilevel
        retention-days: 1

  run-tabu-50-a:
    name: Tabu50-A ${{ matrix.instance }} S${{ matrix.segments_per_level }} L${{ matrix.num_levels }}
    needs: compile
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 40
      matrix:
        segments_per_level: [5, 10, 15]
        num_levels: [3, 4, 5, 6, 7, 8]
        instance: [
          "50.10.1", "50.10.2", "50.10.3", "50.10.4",
          "50.20.1", "50.20.2", "50.20.3", "50.20.4"
        ]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        name: tabu-exe
    - name: Run Tabu 5 times
      run: |
        chmod +x tabu
        ITER_PER_SEG=50
        TOTAL_SEGMENTS=$((2 * ${{ matrix.segments_per_level }} * ${{ matrix.num_levels }}))
        for run in {1..5}; do
          START_TIME=$(date +%s.%N)
          timeout 25m ./tabu instances/${{ matrix.instance }}.txt ${ITER_PER_SEG} ${TOTAL_SEGMENTS} > out${run}.txt 2>&1
          EXIT=$?
          END_TIME=$(date +%s.%N)
          echo "$(echo "$END_TIME - $START_TIME" | bc)" > rt${run}.txt
          [ $EXIT -eq 124 ] && echo "TIMEOUT" >> out${run}.txt
          [ $EXIT -ne 0 ] && [ $EXIT -ne 124 ] && echo "ERROR_EXIT_CODE_$EXIT" >> out${run}.txt
          true
        done
    - name: Parse results
      run: |
        python3 <<'EOF'
        import re, json, os
        instance = "${{ matrix.instance }}"
        parts = instance.split(".")
        segments = ${{ matrix.segments_per_level }}
        levels = ${{ matrix.num_levels }}
        iter_per_seg = 50
        total_iter = 2 * iter_per_seg * segments * levels
        def last(pattern, text):
            m = re.findall(pattern, text)
            return float(m[-1]) if m else 0.0
        def parse(out, rt):
            if not os.path.exists(out):
                return {"runtime": 0.0, "makespan": 0.0, "drone_violation": 0.0,
                        "waiting_violation": 0.0, "fitness": float("inf"), "feasible": "NO_OUTPUT"}
            text = open(out, encoding="utf-8", errors="ignore").read()
            t = 0.0
            if os.path.exists(rt):
                try: t = float(open(rt).read().strip())
                except: pass
            if "TIMEOUT" in text:
                return {"runtime": round(t,3), "makespan": 0.0, "drone_violation": 0.0,
                        "waiting_violation": 0.0, "fitness": float("inf"), "feasible": "TIMEOUT"}
            if "ERROR_EXIT_CODE" in text or "Fitness:" not in text:
                return {"runtime": round(t,3), "makespan": 0.0, "drone_violation": 0.0,
                        "waiting_violation": 0.0, "fitness": float("inf"), "feasible": "ERROR"}
            dv = last(r'Drone violation:\s*([0-9.+\-eE]+)', text)
            wv = last(r'Waiting violation:\s*([0-9.+\-eE]+)', text)
            return {
                "runtime": round(t, 3),
                "makespan": round(last(r'Makespan:\s*([0-9.+\-eE]+)', text), 4),
                "drone_violation": round(dv, 4),
                "waiting_violation": round(wv, 4),
                "fitness": round(last(r'Fitness:\s*([0-9.+\-eE]+)', text), 4),
                "feasible": "YES" if abs(dv) < 1e-6 and abs(wv) < 1e-6 else "NO",
            }
        runs = [{"run": i, **parse(f"out{i}.txt", f"rt{i}.txt")} for i in range(1, 6)]
        json.dump({"instance": instance, "num_customers": int(parts[0]),
                   "group": int(parts[1]), "replica": int(parts[2]),
                   "algorithm": "TABU",
                   "segments_per_level": segments, "num_levels": levels,
                   "iter_per_segment": iter_per_seg, "total_iter": total_iter,
                   "runs": runs}, open("results.json", "w"), indent=2)
        EOF
    - uses: actions/upload-artifact@v4
      with:
        name: tabu50-${{ matrix.instance }}-S${{ matrix.segments_per_level }}-L${{ matrix.num_levels }}
        path: results.json
        retention-days: 30

